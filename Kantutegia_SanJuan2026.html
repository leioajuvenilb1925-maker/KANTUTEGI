<!DOCTYPE html>
<html lang="eu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kantutegia — San Juan Jaiak Leioa 2026</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f2f0eb; color:#1a2a1a; font-family: Arial, sans-serif; min-height:100vh; }

  /* HEADER */
  .header { background:#ffffff; border-bottom:2px solid #4a7a55; padding:1.2rem 1.5rem; }
  .header h1 { font-size:1.3rem; font-weight:700; color:#2c5a3d; letter-spacing:2px; text-transform:uppercase; }
  .header p { font-size:0.8rem; color:#7a9a7a; margin-top:3px; }

  /* GRID */
  .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap:12px; padding:1.5rem; }

  /* CARD */
  .card { background:#ffffff; border:1px solid #d0d4cc; border-radius:10px; cursor:pointer; transition:border-color 0.2s, box-shadow 0.2s; overflow:hidden; }
  .card:hover { border-color:#4a7a55; box-shadow:0 2px 8px rgba(74,122,85,0.15); }
  .card-header { display:flex; align-items:center; gap:12px; padding:14px; }
  .num { background:#4a7a55; color:#fff; font-weight:700; font-size:0.85rem; min-width:30px; height:30px; border-radius:6px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .card-info { flex:1; min-width:0; }
  .card-title { font-size:0.95rem; font-weight:600; color:#1a2a1a; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-sub { font-size:0.72rem; color:#888; margin-top:2px; }
  .card-actions { display:flex; gap:8px; align-items:center; flex-shrink:0; }
  .btn-yt { background:#4a7a55; border:none; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; cursor:pointer; text-decoration:none; transition:background .2s; }
  .btn-yt:hover { background:#3a6645; }
  .btn-yt svg { width:14px; height:14px; fill:#fff; }

  /* FULL PAGE OVERLAY */
  .overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100vh; background:#f2f0eb; z-index:1000; overflow:hidden; flex-direction:column; }
  .overlay.active { display:flex; }

  .letrak-page { max-width:900px; width:100%; margin:0 auto; padding:1.5rem 2rem; display:flex; flex-direction:column; height:100vh; overflow:hidden; }

  .letrak-topbar { display:flex; align-items:center; gap:14px; margin-bottom:2rem; padding-bottom:1rem; border-bottom:1px solid #d0d4cc; flex-wrap:wrap; }
  .btn-back { background:#4a7a55; border:none; color:#fff; padding:10px 20px; border-radius:8px; cursor:pointer; font-size:0.95rem; font-weight:700; display:flex; align-items:center; gap:8px; text-decoration:none; flex-shrink:0; }
  .btn-back:hover { background:#3a6645; }
  .btn-back svg { width:16px; height:16px; fill:#fff; }
  .letrak-nav { display:flex; gap:8px; margin-left:auto; }
  .btn-nav { background:#ffffff; border:1px solid #d0d4cc; color:#4a7a55; width:38px; height:38px; border-radius:8px; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center; }
  .btn-nav:hover { border-color:#4a7a55; }
  .btn-nav:disabled { opacity:0.3; cursor:default; }

  .letrak-topbar { flex-shrink:0; }
  .letrak-header { margin-bottom:1rem; flex-shrink:0; }
  .letrak-num { display:inline-block; background:#4a7a55; color:#fff; font-weight:700; font-size:0.9rem; padding:4px 12px; border-radius:6px; margin-bottom:10px; }
  .letrak-title { font-size:2rem; font-weight:700; color:#2c5a3d; line-height:1.2; margin-bottom:6px; }
  .letrak-egilea { font-size:0.9rem; color:#888; }

  .letrak-audio { width:100%; margin-bottom:1rem; flex-shrink:0; accent-color:#4a7a55; }

  .letrak-body { font-size:1.1rem; line-height:2; color:#2a3a2a; white-space:pre-wrap; background:#ffffff; border-radius:12px; padding:1.5rem 2rem; border-left:4px solid #4a7a55; flex:1; overflow:hidden; column-gap:2.5rem; }

  /* VIDEO MODAL */
  .video-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:2000; align-items:center; justify-content:center; }
  .video-modal.active { display:flex; }
  .video-wrap { position:relative; width:90%; max-width:800px; }
  .video-wrap iframe { width:100%; aspect-ratio:16/9; border:none; border-radius:10px; }
  .video-close { position:absolute; top:-40px; right:0; background:none; border:none; color:#fff; font-size:1.8rem; cursor:pointer; line-height:1; }
  /* LOGO */
  .logo-badagiro { height:60px; width:auto; mix-blend-mode:multiply; display:block; }
  .header { display:flex; align-items:center; gap:14px; }
  .header-text { flex:1; }
  .letrak-topbar-logo { height:48px; width:auto; mix-blend-mode:multiply; }
</style>
</head>

const STORAGE_BASE    = `${SUPABASE_URL}/storage/v1/object/public/${SUPABASE_BUCKET}/`;

const mp3Map = {};

async function cargarMapaAudio() {
  try {
    const res = await fetch(`${SUPABASE_URL}/storage/v1/object/list/${SUPABASE_BUCKET}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}`, 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ prefix: '', limit: 200, offset: 0 })
    });
    const files = await res.json();
    if (!Array.isArray(files)) return;
    files.forEach(f => {
      const m = f.name.match(/^(\d+)/);
      if (m) mp3Map[parseInt(m[1], 10)] = f.name;
    });
  } catch (e) { console.warn('Audio map error:', e); }
}

function mp3Path(song) {
  const filename = mp3Map[song.n];
  return filename ? STORAGE_BASE + encodeURIComponent(filename) : '';
}

let _activeCardAudio = null;

function playCardAudio(song, btn, e) {
  e.preventDefault();
  e.stopPropagation();
  const path = mp3Path(song);
  if (_activeCardAudio && _activeCardAudio._btn !== btn) {
    _activeCardAudio.pause();
    _activeCardAudio._btn.innerHTML = playIcon();
    _activeCardAudio = null;
  }
  if (!btn._audio) {
    const a = new Audio(path);
    a._btn = btn;
    btn._audio = a;
    a.addEventListener('ended', () => { btn.innerHTML = playIcon(); _activeCardAudio = null; });
    a.addEventListener('pause', () => { if (!a.ended) btn.innerHTML = playIcon(); });
    a.addEventListener('play', () => { btn.innerHTML = pauseIcon(); });
  }
  const audio = btn._audio;
  if (audio.paused) { audio.play().catch(() => {}); _activeCardAudio = audio; }
  else { audio.pause(); _activeCardAudio = null; }
}

function playIcon() {
  return '<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21" fill="#fff"/></svg>';
}
function pauseIcon() {
  return '<svg viewBox="0 0 24 24"><rect x="5" y="3" width="4" height="18" fill="#fff"/><rect x="15" y="3" width="4" height="18" fill="#fff"/></svg>';

        b.style.flex = '1';
        b.style.overflow = 'hidden';
        if (h2 > available) {
          b.style.fontSize = '0.92rem';
          b.style.lineHeight = '1.75';
        }
      });
    }
  });
}

function openSong(idx) {
  currentIdx = idx;
  const s = songs[idx];
  document.getElementById('lk-num').textContent = s.n + ' / 27';
  document.getElementById('lk-title').textContent = s.title;
  document.getElementById('lk-egilea').textContent = s.egilea;
  document.getElementById('lk-body').textContent = s.letrak;
  const lkAudio = document.getElementById('lk-audio');
  lkAudio.pause();
  lkAudio.src = mp3Path(s);
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === songs.length - 1;
  const overlay = document.getElementById('overlay');
  overlay.classList.add('active');
  adjustColumns();
}

function closeSong() {
  document.getElementById('overlay').classList.remove('active');
  const a = document.getElementById('lk-audio');
  a.pause();
  a.src = '';
}

// Build grid
cargarMapaAudio().finally(() => {
const grid = document.getElementById('grid');
songs.forEach((s, idx) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-header">
      <div class="num">${s.n}</div>
      <div class="card-info">
        <div class="card-title">${s.title}</div>
        <div class="card-sub">${s.egilea}</div>
      </div>
      <div class="card-actions">
        <button class="btn-yt" title="Erreproduzitu" id="btn-play-${idx}">${playIcon()}</button>
      </div>
    </div>
  `;
  card.addEventListener('click', () => openSong(idx));
  grid.appendChild(card);
  const playBtn = document.getElementById(`btn-play-${idx}`);
  playBtn.addEventListener('click', (e) => playCardAudio(s, playBtn, e));
});
}); // fin cargarMapaAudio

document.getElementById('btn-back').addEventListener('click', closeSong);
document.getElementById('btn-prev').addEventListener('click', () => openSong(currentIdx - 1));
document.getElementById('btn-next').addEventListener('click', () => openSong(currentIdx + 1));

document.addEventListener('keydown', e => {
  if (!document.getElementById('overlay').classList.contains('active')) return;
  if (e.key === 'Escape') { closeSong(); }
  if (e.key === 'ArrowRight' && currentIdx < songs.length - 1) openSong(currentIdx + 1);
  if (e.key === 'ArrowLeft' && currentIdx > 0) openSong(currentIdx - 1);
});
</script>
</body>
</html>
